<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/dreadmere.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
</head>
<body>

  <div class="ember-particles" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <div class="sigil" aria-hidden="true">✦</div>
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <div class="sigil" aria-hidden="true">✦</div>
    </div>
    <p class="site-tagline">{{ site.description }}</p>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">The Scrolls</a>
      <span class="nav-sep">⸻</span>
      <a href="{{ '/about/' | relative_url }}">About</a>
    </nav>
    <div class="header-rule"></div>
  </header>

  <main class="page-content">
    <div class="content-wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-rule"></div>
    <p class="footer-rune" aria-hidden="true">⚔ ✦ ⚔</p>
    <p class="footer-text">The Scrolls of Dreadmere &mdash; Written within the realm. All rights reserved.</p>
  </footer>

</body>
</html>
